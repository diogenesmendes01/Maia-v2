name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: typecheck + test + lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Hermetic placeholders — tests/setup.ts overrides these too, but
      # config validation runs at module load before vitest's setup file.
      NODE_ENV: test
      DATABASE_URL: postgres://maia_test:test1234@localhost:5432/maia_test
      POSTGRES_USER: maia_test
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: maia_test
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: sk-ant-test-placeholder
      OPENROUTER_API_KEY: sk-or-test-placeholder
      WHATSAPP_NUMBER_MAIA: '+5500000000000'
      OWNER_TELEFONE_WHATSAPP: '+5511111111111'
      OWNER_NOME: Test Owner
      VOYAGE_API_KEY: test-voyage-key
      ALERT_CHANNELS: log
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit equivalent via build)
        run: npm run build

      - name: Run unit tests
        # Integration tests skip when TEST_DB_URL is unset — the unit lane is
        # always green on CI. Add a separate job with services if/when we
        # want integration coverage in CI.
        run: npx vitest run

      - name: Lint
        # `--max-warnings=0` would flip warnings to failures; we keep them as
        # warnings for now so existing code can be cleaned incrementally.
        run: npm run lint

      - name: Verify clean build artifacts produced
        run: test -d dist && test -f dist/index.js
