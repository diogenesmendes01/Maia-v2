version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lia}
      POSTGRES_DB: ${POSTGRES_DB:-lia}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lia_pg_data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lia}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lia-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lia_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-lia}:${POSTGRES_PASSWORD:-lia}@postgres:5432/${POSTGRES_DB:-lia}
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TZ: America/Sao_Paulo
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - lia_baileys_auth:/app/.baileys-auth
      - lia_media:/app/media

volumes:
  lia_pg_data:
  lia_redis_data:
  lia_baileys_auth:
  lia_media:
